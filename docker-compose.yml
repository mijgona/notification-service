services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notify
      POSTGRES_PASSWORD: notify
      POSTGRES_DB: notify
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify"]
      interval: 3s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=notify
      - POSTGRES_PWD=notify
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8233:8080"

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  api:
    build: .
    command: ["/bin/api"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://notify:notify@postgres:5432/notify?sslmode=disable
      - HTTP_ADDR=:8080
    ports:
      - "8080:8080"

  relay:
    build: .
    command: ["/bin/relay"]
    depends_on:
      - api
      - temporal
    environment:
      - DATABASE_URL=postgres://notify:notify@postgres:5432/notify?sslmode=disable
      - TEMPORAL_HOSTPORT=temporal:7233

  worker:
    build: .
    command: ["/bin/worker"]
    depends_on:
      - relay
      - mailpit
    environment:
      - DATABASE_URL=postgres://notify:notify@postgres:5432/notify?sslmode=disable
      - TEMPORAL_HOSTPORT=temporal:7233
      - SMTP_ADDR=mailpit:1025
      - SMTP_FROM=notify@example.com
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
